<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample CRUD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

</head>

<body>
    <form id="userForm">
        <h1 class="text-primary" style="text-align: center;">CRUD</h1>
        <div class="d-flex justify-content-center">
            <input type="hidden" id="editIndex">
            <label for="name">Name:</label>
            <input id="name" type="text" style="width: 30%" class="rounded-5" required>&nbsp;&nbsp;

            <label for="email">Email:</label>
            <input type="text" id="email" style="width: 30%" class="rounded-5" required>&nbsp;
            <button type="submit" class="btn btn-warning rounded-5">Save</button>
        </div>
    </form>
    <br><br>


    <!-- table -->

    <table class="table table bordered table-hover">
        <thead class="table-dark">
            <tr>
                <td>#</td>
                <td>Name</td>
                <td>Email</td>
                <td>Actions</td>
            </tr>
        </thead>
        <tbody id="tableBody">

        </tbody>
    </table>
    </div>


</body>
<script src="./script.js"></script>

</html>
